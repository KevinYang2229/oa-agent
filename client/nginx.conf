# client 靜態網站：SPA fallback（任何路徑找不到檔案就回 index.html）
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 靜態資源帶長快取（檔名含 hash，可安全長期快取）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
